version: "3"

includes:
  backend:
    taskfile: ./taskfiles/backend.yml
    dir: backend
  frontend:
    taskfile: ./taskfiles/frontend.yml
    dir: frontend
  db:
    taskfile: ./taskfiles/db.yml
    dir: backend
  api:
    taskfile: ./taskfiles/api.yml
    dir: frontend

tasks:
  # ── Orchestration ───────────────────────────────
  check:
    desc: Run all checks (fmt, lint, build, test)
    cmds:
      - task: check:static
      - task: check:runtime

  check:static:
    desc: Format and lint checks (parallel)
    deps:
      - fmt:check
      - lint

  check:runtime:
    desc: Build and test (frontend parallel, backend sequential)
    deps:
      - frontend:build
      - frontend:test
    cmds:
      - task: backend:build
      - task: backend:test

  fmt:
    desc: Format all code
    deps:
      - backend:fmt
      - frontend:fmt

  fmt:check:
    desc: Check formatting without modifying files
    deps:
      - backend:fmt:check
      - frontend:fmt:check

  lint:
    desc: Lint all code
    deps:
      - backend:lint
      - frontend:lint

  build:
    desc: Build all
    deps:
      - backend:build
      - frontend:build

  test:
    desc: Run all tests
    deps:
      - backend:test
      - frontend:test

  coverage:
    desc: Run all tests with coverage
    deps:
      - backend:coverage:lcov
      - frontend:coverage

  audit:
    desc: Run security audits (backend + frontend)
    deps:
      - backend:deny
      - frontend:audit

  deps:check:
    desc: Check dependency health (outdated + unused)
    cmds:
      - task: backend:outdated
      - task: backend:machete

  # ── Gitmoji ───────────────────────────────────
  gitmoji:sync:
    desc: Sync gitmoji pattern from upstream
    cmd: .claude/hooks/sync-gitmoji-pattern.sh
