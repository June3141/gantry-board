services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    environment:
      - GANTRY_BIND_ADDR=0.0.0.0:3000
      - GANTRY_DATABASE_URL=sqlite:/data/gantry_board.db?mode=rwc
      - GANTRY_CORS_ORIGIN=${GANTRY_CORS_ORIGIN:-http://localhost}
      # Authentication relies on DB-backed sessions; no separate secret is needed.
      - GANTRY_COOKIE_SECURE=${GANTRY_COOKIE_SECURE:-true}
      - GANTRY_GITHUB_TOKEN=${GANTRY_GITHUB_TOKEN:-}
    volumes:
      - gantry-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
          pids: 256
        reservations:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${GANTRY_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gantry-data:
