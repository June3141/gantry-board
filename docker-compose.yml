services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3000"
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/workspace/target
    working_dir: /workspace
    environment:
      - RUST_LOG=info
      - GANTRY_BIND_ADDR=0.0.0.0:3000
      - GANTRY_DATABASE_URL=sqlite:/workspace/backend/data/gantry_board.db?mode=rwc
      - GANTRY_CORS_ORIGIN=http://localhost:3000
      - GANTRY_COOKIE_SECURE=false  # DEV ONLY — set to true in production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cargo-cache:
  cargo-target:
