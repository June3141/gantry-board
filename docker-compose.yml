services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/workspace/target
    working_dir: /workspace
    environment:
      - RUST_LOG=info
      - BIND_ADDR=0.0.0.0:3000
      - DATABASE_URL=sqlite:/workspace/backend/data/gantry_board.db?mode=rwc
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  cargo-cache:
  cargo-target:
