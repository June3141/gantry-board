name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  pr-title:
    name: PR title lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # gitmoji + scope: subject
          pattern='^(✨|🐛|📝|✅|♻️|🔧|🎨|⚡️|🔥|💥|🚀|🚧|🔒|⬆️|🗃️|🎉) [a-z]+: .+$'
          if ! echo "$PR_TITLE" | grep -qP "$pattern"; then
            echo "::error::PR title must match gitmoji + scope format."
            echo "  Expected: <emoji> <scope>: <subject>"
            echo "  Example:  ✨ backend: add health check endpoint"
            echo "  Got:      $PR_TITLE"
            exit 1
          fi
          if [ ${#PR_TITLE} -gt 70 ]; then
            echo "::error::PR title must be 70 characters or less (got ${#PR_TITLE})."
            exit 1
          fi

  rust:
    name: Rust (build, test, clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo build
      - run: cargo test

  api:
    name: API (openapi export, orval diff)
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cargo test --test export_openapi -- --nocapture
      - run: cd frontend && npm ci
      - run: cd frontend && npx orval
      - run: cd frontend && git diff --exit-code src/api/generated/
        name: Check generated API client is up to date

  frontend:
    name: Frontend (lint, format, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint .
      - run: cd frontend && npx prettier --check 'src/**/*.{ts,tsx,css}'
      - run: cd frontend && npm run build
