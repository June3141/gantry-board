name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 変更検出 ────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'deny.toml'
              - '.config/nextest.toml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            api:
              - 'backend/src/handlers/**'
              - 'backend/src/models/**'
              - 'backend/src/openapi.rs'
              - 'backend/src/lib.rs'
              - 'backend/tests/export_openapi.rs'
              - 'frontend/orval.config.*'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── PR タイトル lint ─────────────────────────────
  pr-title:
    name: PR title lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Load gitmoji pattern from shared file
          GITMOJI_FILE=".claude/hooks/gitmoji-pattern.txt"
          if [[ -f "$GITMOJI_FILE" ]]; then
            EMOJIS=$(cat "$GITMOJI_FILE")
          else
            echo "::error::$GITMOJI_FILE not found. Run 'task gitmoji:sync' to generate."
            exit 1
          fi
          TYPES='feat|fix|docs|test|refactor|chore|style|perf'
          pattern="^($TYPES): ($EMOJIS) .+$"
          if ! echo "$PR_TITLE" | grep -qP "$pattern"; then
            echo "::error::PR title must match type: emoji subject format."
            echo "  Expected: <type>: <emoji> <subject>"
            echo "  Example:  feat: ✨ add health check endpoint"
            echo "  Got:      $PR_TITLE"
            exit 1
          fi
          if [ ${#PR_TITLE} -gt 70 ]; then
            echo "::error::PR title must be 70 characters or less (got ${#PR_TITLE})."
            exit 1
          fi

  # ── Rust (fmt, clippy, nextest) ──────────────────
  rust:
    name: Rust (clippy, test)
    runs-on: ubuntu-latest
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-nextest
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo nextest run --profile ci -E 'not binary(export_openapi)'
        working-directory: backend
      - run: cargo test --test export_openapi -- --nocapture
        working-directory: backend
      - uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi.json
          retention-days: 1

  # ── API (orval diff) ─────────────────────────────
  api:
    name: API (orval diff)
    runs-on: ubuntu-latest
    needs: [changes, rust]
    if: needs.changes.outputs.api == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: openapi-spec
          path: .
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx orval
      - run: cd frontend && npx biome check --write src/api/generated/
      - run: cd frontend && git diff --exit-code src/api/generated/
        name: Check generated API client is up to date

  # ── Frontend (lint, test, build) ─────────────────
  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx biome check src/
      - run: cd frontend && npx vitest run
      - run: cd frontend && npm run build

  # ── Security (cargo-deny, npm audit) ───────────
  # Runs unconditionally: vulnerability databases update independently of code changes
  security:
    name: Security (cargo-deny, npm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-deny
      - run: cargo deny check
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm audit --audit-level=moderate
        continue-on-error: true

  # ── E2E (Playwright) ────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [changes, rust, frontend]
    if: >-
      always() &&
      (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true') &&
      needs.rust.result != 'failure' && needs.rust.result != 'cancelled' &&
      needs.frontend.result != 'failure' && needs.frontend.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      # Backend build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build
        working-directory: backend

      # Frontend setup
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx playwright install --with-deps chromium

      # Start backend (use pre-built binary instead of cargo run)
      - name: Start backend server
        run: |
          mkdir -p backend/data
          ../target/debug/gantry-board &
          echo $! > /tmp/backend.pid
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::Backend failed to start within 30 seconds"
              exit 1
            fi
            sleep 1
          done
        working-directory: backend
        env:
          GANTRY_COOKIE_SECURE: "false"
          GANTRY_CORS_ORIGIN: "http://localhost:5173"
          GANTRY_REGISTER_RATE_LIMIT_PER_SECOND: "1"
          GANTRY_REGISTER_RATE_LIMIT_BURST: "100"
          GANTRY_LOGIN_RATE_LIMIT_PER_SECOND: "1"
          GANTRY_LOGIN_RATE_LIMIT_BURST: "100"
          GANTRY_GENERAL_RATE_LIMIT_PER_SECOND: "1"
          GANTRY_GENERAL_RATE_LIMIT_BURST: "1000"

      # Start frontend dev server
      - name: Start frontend dev server
        run: |
          cd frontend && npm run dev &
          echo $! > /tmp/frontend.pid
          # Wait for frontend to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            if [ "$i" = "30" ]; then
              echo "::error::Frontend dev server failed to start within 30 seconds"
              exit 1
            fi
            sleep 1
          done

      # Run E2E tests
      - run: cd frontend && npx playwright test
        env:
          E2E_BASE_URL: http://localhost:5173
          E2E_API_URL: http://localhost:3000

      # Cleanup background processes
      - name: Stop servers
        if: always()
        run: |
          [ -f /tmp/backend.pid ] && kill "$(cat /tmp/backend.pid)" 2>/dev/null || true
          [ -f /tmp/frontend.pid ] && kill "$(cat /tmp/frontend.pid)" 2>/dev/null || true

      # Upload report on success or failure
      - uses: actions/upload-artifact@v4
        if: '!cancelled()'
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ── Coverage (informational) ───────────────────
  coverage:
    name: Coverage (informational)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - run: cargo llvm-cov nextest --text --skip-functions
        working-directory: backend
