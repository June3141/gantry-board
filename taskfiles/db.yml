version: "3"

tasks:
  create:
    desc: Create SQLite database
    cmd: sqlx database create

  migrate:
    desc: Run database migrations
    cmd: sqlx migrate run

  migrate:add:
    desc: "Create a new migration (usage: task db:migrate:add -- <name>)"
    cmd: sqlx migrate add {{.CLI_ARGS}}

  migrate:info:
    desc: Show migration status
    cmd: sqlx migrate info

  reset:
    desc: Drop and recreate database
    cmds:
      - sqlx database drop -y
      - sqlx database create
      - sqlx migrate run

  backup:
    desc: Create a manual SQLite backup
    cmds:
      - |
        mkdir -p ./data/backups
        BACKUP_FILE="./data/backups/gantry_board_$(date +%Y%m%d_%H%M%S).db"
        sqlite3 ./data/gantry_board.db "PRAGMA wal_checkpoint(TRUNCATE);"
        sqlite3 ./data/gantry_board.db "VACUUM INTO '${BACKUP_FILE}';"
        echo "Backup created: ${BACKUP_FILE}"
        ls -lh "${BACKUP_FILE}"

  vacuum:
    desc: Run VACUUM on the SQLite database to reclaim space
    cmds:
      - |
        echo "Running WAL checkpoint..."
        sqlite3 ./data/gantry_board.db "PRAGMA wal_checkpoint(TRUNCATE);"
        echo "Running VACUUM..."
        sqlite3 ./data/gantry_board.db "VACUUM;"
        echo "Running PRAGMA optimize..."
        sqlite3 ./data/gantry_board.db "PRAGMA optimize;"
        echo "Done. Current DB size:"
        ls -lh ./data/gantry_board.db
